version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: ifaa-container
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  fraud-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-container
    restart: always
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - .:/app

volumes:
  postgres_data:
