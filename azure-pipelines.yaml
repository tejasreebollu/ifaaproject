trigger:
  branches:
    include:
      - main

variables:
  acrConnection: 'acr-ifaa-connection'
  azureSubscription: 'azure-ifaa-connection'
  imageRepository: 'ifaaproject'
  containerRegistry: 'ifaapjt.azurecr.io'
  aksResourceGroup: 'tejuifaa-rg'
  aksClusterName: 'tejuifaa-aks'
  imageTag: '$(Build.BuildId)'

stages:

- stage: Build
  displayName: 'Build & Push to ACR'
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: Docker@2
      displayName: 'Build and Push Docker Image'
      inputs:
        command: 'buildAndPush'
        repository: '$(imageRepository)'
        dockerfile: '**/Dockerfile'
        containerRegistry: '$(acrConnection)'
        tags: |
          $(imageTag)
          latest

    - task: PublishPipelineArtifact@1
      displayName: 'Publish K8s Manifests'
      inputs:
        targetPath: '$(Build.SourcesDirectory)/k8s'
        artifact: 'k8s-manifests'

- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: Deploy
    displayName: 'Deploy Application'
    environment: 'production'

    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Kubernetes Manifests'
            inputs:
              artifact: 'k8s-manifests'
              path: '$(Pipeline.Workspace)/k8s'

          - task: KubernetesManifest@1
            displayName: 'Apply Postgres Secret'
            inputs:
              action: 'deploy'
              connectionType: 'azureResourceManager'
              azureSubscriptionConnection: '$(azureSubscription)'
              azureResourceGroup: '$(aksResourceGroup)'
              kubernetesCluster: '$(aksClusterName)'
              namespace: 'default'
              manifests: |
                $(Pipeline.Workspace)/k8s/postgres-secret.yaml

          - task: KubernetesManifest@1
            displayName: 'Deploy Postgres'
            inputs:
              action: 'deploy'
              connectionType: 'azureResourceManager'
              azureSubscriptionConnection: '$(azureSubscription)'
              azureResourceGroup: '$(aksResourceGroup)'
              kubernetesCluster: '$(aksClusterName)'
              namespace: 'default'
              manifests: |
                $(Pipeline.Workspace)/k8s/postgres.yaml

          - task: KubernetesManifest@1
            displayName: 'Deploy Application'
            inputs:
              action: 'deploy'
              connectionType: 'azureResourceManager'
              azureSubscriptionConnection: '$(azureSubscription)'
              azureResourceGroup: '$(aksResourceGroup)'
              kubernetesCluster: '$(aksClusterName)'
              namespace: 'default'
              manifests: |
                $(Pipeline.Workspace)/k8s/deployment.yaml
                $(Pipeline.Workspace)/k8s/service.yaml
              containers: |
                $(containerRegistry)/$(imageRepository):$(imageTag)