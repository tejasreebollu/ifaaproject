apiVersion: apps/v1
kind: Deployment
metadata:
  name: ifaa-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ifaa-app
  template:
    metadata:
      labels:
        app: ifaa-app
    spec:
      containers:
        - name: ifaa-app
          image: ifaaacr.azurecr.io/ifaa:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ifaa-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
